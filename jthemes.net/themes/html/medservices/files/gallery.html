	<style>
		/* Gallery specific improvements */
		.gallery-item {
			margin-bottom: 30px;
			border-radius: 12px;
			overflow: hidden;
			box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
			transition: all 0.3s ease;
		}

		.gallery-item:hover {
			transform: translateY(-5px);
			box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
		}

		.gallery-img-wrapper {
			position: relative;
			overflow: hidden;
			display: block;
		}

		.gallery-img {
			width: 100%;
			height: 280px;
			object-fit: cover;
			display: block;
			transition: all 0.5s ease;
		}

		.gallery-item:hover .gallery-img {
			transform: scale(1.08);
		}

		.gallery-overlay {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: rgba(0, 102, 179, 0.6);
			/* Steelblue transparent */
			opacity: 0;
			transition: opacity 0.3s ease;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.gallery-item:hover .gallery-overlay {
			opacity: 1;
		}

		.gallery-overlay i {
			color: white;
			font-size: 2.5rem;
			transform: scale(0.5);
			transition: transform 0.3s ease;
		}

		.gallery-item:hover .gallery-overlay i {
			transform: scale(1);
		}
	</style>
</head>
